name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Create Gradle Wrapper Properties
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

    - name: Download Gradle Wrapper JAR
      run: |
        # Try multiple sources for the wrapper jar
        curl -L --retry 3 --retry-delay 5 -o gradle/wrapper/gradle-wrapper.jar \
          "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" || \
        curl -L --retry 3 --retry-delay 5 -o gradle/wrapper/gradle-wrapper.jar \
          "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" || \
        echo "Will use system gradle"

    - name: Build with Gradle
      run: |
        # Use system gradle as fallback
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          gradle wrapper --gradle-version 8.4
        fi
        ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Show Build Output
      if: failure()
      run: |
        echo "Build failed. Checking for errors..."
        cat app/build/outputs/*/logs/*.log 2>/dev/null || echo "No log files found"
