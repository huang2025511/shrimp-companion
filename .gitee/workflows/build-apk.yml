name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk: ''
        cmake: ''

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Initialize Gradle Wrapper
      run: |
        # Create gradle wrapper properties if missing
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
        
        # Download wrapper jar
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://services.gradle.org/distributions/gradle-8.0-bin.zip && \
        unzip -o -j gradle/wrapper/gradle-wrapper.jar -d gradle/wrapper/ lib/gradle-wrapper-*.jar || true

    - name: Build with Gradle
      run: |
        # Accept Android SDK licenses
        yes | sdkmanager --licenses >/dev/null 2>&1 || true
        
        # Build APK
        ./gradlew --no-daemon --stacktrace assembleDebug assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn
